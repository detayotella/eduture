<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Exercise - Knowledge Check</title>
<!-- Google Fonts: Inter & JetBrains Mono -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config from Design System -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary-fixed": "#00174b",
                        "secondary-fixed": "#dce1ff",
                        "on-secondary-fixed": "#00164e",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#33302c",
                        "tertiary-fixed-dim": "#d0bcff",
                        "on-tertiary-fixed-variant": "#5516be",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#6b38d4",
                        "on-tertiary-fixed": "#23005c",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary-container": "#8fa7fe",
                        "on-secondary-container": "#1d3989",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#424754",
                        "surface-bright": "#fff8f2",
                        "on-surface": "#1e1b17",
                        "tertiary-fixed": "#e9ddff",
                        "surface-tint": "#0053db",
                        "inverse-primary": "#b4c5ff",
                        "background": "#fff8f2",
                        "surface-dim": "#e0d9d2",
                        "secondary-fixed-dim": "#b6c4ff",
                        "on-error": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#fffbff",
                        "surface-container-high": "#eee7e0",
                        "on-secondary-fixed-variant": "#264191",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f7efe9",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#faf2eb",
                        "surface-container-highest": "#e8e1db",
                        "secondary": "#4059aa",
                        "primary": "#0051d5",
                        "primary-container": "#316bf3",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c2c6d6",
                        "tertiary-container": "#8455ef",
                        "surface": "#fff8f2",
                        "on-background": "#1e1b17",
                        "surface-variant": "#e8e1db",
                        "surface-container": "#f4ede6",
                        "on-primary-container": "#fefcff",
                        "error": "#ba1a1a",
                        "outline": "#727785"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        /* Utility for Glassmorphism & Textures */
        .glass-header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .btn-primary-gradient {
            background: linear-gradient(135deg, theme('colors.primary'), theme('colors.primary-container'));
        }
        .ghost-border {
            box-shadow: inset 0 0 0 1px rgba(194, 198, 214, 0.15); /* outline-variant at 15% */
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px rgba(30, 27, 23, 0.04), 0 2px 8px rgba(30, 27, 23, 0.08);
        }
        
        /* Typography Scale Utilities */
        .text-display-lg { font-size: 3.5rem; line-height: 1.1; letter-spacing: -0.02em; }
        .text-headline-md { font-size: 1.75rem; line-height: 1.2; letter-spacing: -0.01em; }
        .text-title-lg { font-size: 1.375rem; line-height: 1.4; letter-spacing: 0; }
        .text-body-lg { font-size: 1rem; line-height: 1.625; letter-spacing: 0; }
        .text-label-md { font-size: 0.75rem; line-height: 1.5; letter-spacing: 0.05em; text-transform: uppercase; }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Task-Focused Header (Suppressed Global Nav) -->
<header class="sticky top-0 z-50 glass-header w-full">
<div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
<!-- Back Action -->
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors group">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span class="text-body-lg font-medium">Hardware Basics</span>
</button>
<!-- Timer -->
<div class="flex items-center gap-2 text-on-surface-variant bg-surface-container-high px-3 py-1.5 rounded-md">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">timer</span>
<span class="font-mono font-medium text-sm">04:20</span>
</div>
</div>
<!-- Progress Line (90%) -->
<div class="w-full h-[3px] bg-surface-variant absolute bottom-0">
<div class="h-full bg-primary" style="width: 90%;"></div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto px-6 py-12 md:py-20 flex flex-col">
<!-- Content Header Area -->
<div class="mb-10 pl-2">
<div class="inline-flex items-center gap-2 bg-surface-container-low text-on-surface-variant px-4 py-1.5 rounded-full text-label-md font-semibold mb-6 shadow-sm">
<span>✏️</span>
<span>Exercise</span>
</div>
<h1 class="text-headline-md font-headline font-semibold text-on-surface mb-3">Knowledge Check</h1>
<p class="text-title-lg font-headline text-on-surface-variant max-w-[65ch]">Which of the following is an input device?</p>
</div>
<!-- Interactive Options (Radio Cards) -->
<div class="space-y-4 w-full flex-1">
<!-- Option 1: Unselected -->
<label class="group relative flex items-center p-5 rounded-xl bg-surface-container-lowest ghost-border cursor-pointer hover:bg-surface-container-low transition-all duration-200">
<input class="peer sr-only" name="hardware_q1" type="radio" value="monitor"/>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors mr-4 text-[24px]">radio_button_unchecked</span>
<span class="text-body-lg text-on-surface font-medium flex-1">Monitor</span>
</label>
<!-- Option 2: Unselected -->
<label class="group relative flex items-center p-5 rounded-xl bg-surface-container-lowest ghost-border cursor-pointer hover:bg-surface-container-low transition-all duration-200">
<input class="peer sr-only" name="hardware_q1" type="radio" value="printer"/>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors mr-4 text-[24px]">radio_button_unchecked</span>
<span class="text-body-lg text-on-surface font-medium flex-1">Printer</span>
</label>
<!-- Option 3: Selected & Correct (Mastery Progression Card Style) -->
<div class="relative">
<label class="group relative flex items-center p-5 rounded-xl bg-surface-container-lowest ambient-shadow cursor-pointer z-10 overflow-hidden">
<!-- Accent Bar (Mastery Focus) -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<input checked="" class="peer sr-only" name="hardware_q1" type="radio" value="keyboard"/>
<!-- Checked Icon -->
<span class="material-symbols-outlined text-primary mr-4 text-[24px]" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
<span class="text-body-lg text-on-surface font-semibold flex-1">Keyboard</span>
<!-- Success Indicator inside card -->
<span class="material-symbols-outlined text-primary text-[24px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</label>
<!-- Immediate Feedback Panel (Attached to selected item) -->
<div class="bg-primary-fixed/40 border border-primary-fixed text-on-primary-fixed-variant p-5 rounded-b-xl -mt-2 pt-6 pl-14 relative z-0 animate-fade-in flex flex-col gap-1">
<span class="font-bold font-headline">Great job!</span>
<span class="text-body-lg text-on-primary-fixed opacity-90 max-w-[65ch]">A keyboard is used to input text and commands into the computer, making it a primary input device.</span>
</div>
</div>
<!-- Option 4: Unselected -->
<label class="group relative flex items-center p-5 rounded-xl bg-surface-container-lowest ghost-border cursor-pointer hover:bg-surface-container-low transition-all duration-200 mt-4">
<input class="peer sr-only" name="hardware_q1" type="radio" value="speakers"/>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors mr-4 text-[24px]">radio_button_unchecked</span>
<span class="text-body-lg text-on-surface font-medium flex-1">Speakers</span>
</label>
</div>
</main>
<!-- Navigation Footer -->
<footer class="w-full bg-surface-container-low py-6 px-6 mt-8">
<div class="max-w-3xl mx-auto flex items-center justify-between">
<!-- Tertiary Button: Previous -->
<button class="flex items-center gap-2 text-primary hover:bg-surface-variant/50 px-4 py-2.5 rounded-lg transition-colors font-medium text-body-lg">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">navigate_before</span>
                Previous
            </button>
<!-- Primary Button: Complete Topic -->
<button class="flex items-center gap-2 btn-primary-gradient text-on-primary px-6 py-3 rounded-lg shadow-md hover:shadow-lg transition-all active:scale-[0.98] font-semibold text-body-lg">
                Complete Topic
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
</div>
</footer>
</body></html>
