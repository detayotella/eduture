<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Assessment - EDUTURE 2.0</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f7efe9",
                        "primary": "#0051d5",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#e9ddff",
                        "secondary-fixed-dim": "#b6c4ff",
                        "surface-dim": "#e0d9d2",
                        "on-surface-variant": "#424754",
                        "surface-container-low": "#faf2eb",
                        "inverse-surface": "#33302c",
                        "surface-container-highest": "#e8e1db",
                        "tertiary": "#6b38d4",
                        "on-background": "#1e1b17",
                        "secondary": "#4059aa",
                        "on-secondary-fixed": "#00164e",
                        "on-tertiary-fixed": "#23005c",
                        "surface-tint": "#0053db",
                        "on-error": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-secondary-container": "#1d3989",
                        "outline-variant": "#c2c6d6",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "secondary-fixed": "#dce1ff",
                        "surface": "#fff8f2",
                        "on-primary-container": "#fefcff",
                        "secondary-container": "#8fa7fe",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "tertiary-container": "#8455ef",
                        "surface-variant": "#e8e1db",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#5516be",
                        "primary-container": "#316bf3",
                        "surface-bright": "#fff8f2",
                        "background": "#fff8f2",
                        "tertiary-fixed-dim": "#d0bcff",
                        "on-surface": "#1e1b17",
                        "outline": "#727785",
                        "on-secondary-fixed-variant": "#264191",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#00174b",
                        "surface-container-high": "#eee7e0",
                        "surface-container": "#f4ede6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .gradient-text {
            background: linear-gradient(135deg, #0051d5, #316bf3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px rgba(30, 27, 23, 0.04), 0 2px 8px rgba(30, 27, 23, 0.08);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopNavBar (Semantic Shell) -->
<header class="bg-[#fff8f2] text-[#0051d5] font-inter text-body-lg docked full-width top-0 border-b-0 tonal-transition bg-[#eee7e0] flat no shadows flex justify-between items-center px-6 h-16 w-full max-w-full z-50">
<div class="text-xl font-black text-[#1e1b17] tracking-tight">EDUTURE 2.0</div>
<!-- Assessment Meta -->
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 text-on-surface-variant font-mono text-sm bg-surface-container-low px-4 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span>12:45</span>
</div>
<div class="text-sm font-semibold tracking-wide text-primary">
                5 of 18
            </div>
</div>
<div class="flex items-center gap-4 hidden md:flex">
<button aria-label="notifications" class="text-stone-500 hover:bg-[#faf2eb] transition-colors scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button aria-label="account_circle" class="text-stone-500 hover:bg-[#faf2eb] transition-colors scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col justify-center items-center px-4 py-12 md:py-24 relative overflow-hidden">
<!-- Subtle decorative background element -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-fixed-dim/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="w-full max-w-3xl z-10">
<!-- Question Context/Tag -->
<div class="mb-6 flex items-center gap-3">
<span class="bg-tertiary-fixed/30 text-on-tertiary-fixed text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-tertiary-fixed/50">
                    Hardware Basics
                </span>
</div>
<!-- Question Text -->
<h1 class="font-headline text-[1.75rem] md:text-[2rem] font-semibold leading-[1.3] tracking-tight text-on-surface mb-12 max-w-[65ch]">
                Which of the following is an example of an output device?
            </h1>
<!-- Options (Bento/Card Style) -->
<div class="flex flex-col gap-4">
<!-- Option 1 -->
<label class="group cursor-pointer relative">
<input class="peer sr-only" name="question_5" type="radio" value="monitor"/>
<div class="bg-surface-container-lowest p-6 rounded-lg ambient-shadow border border-outline-variant/15 transition-all duration-200 group-hover:-translate-y-0.5 group-hover:shadow-md peer-checked:bg-surface-container-high peer-checked:border-primary peer-checked:shadow-none flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-body-lg text-on-surface font-medium flex-grow">Monitor</span>
</div>
</label>
<!-- Option 2 -->
<label class="group cursor-pointer relative">
<input class="peer sr-only" name="question_5" type="radio" value="keyboard"/>
<div class="bg-surface-container-lowest p-6 rounded-lg ambient-shadow border border-outline-variant/15 transition-all duration-200 group-hover:-translate-y-0.5 group-hover:shadow-md peer-checked:bg-surface-container-high peer-checked:border-primary peer-checked:shadow-none flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-body-lg text-on-surface font-medium flex-grow">Keyboard</span>
</div>
</label>
<!-- Option 3 -->
<label class="group cursor-pointer relative">
<input class="peer sr-only" name="question_5" type="radio" value="cpu"/>
<div class="bg-surface-container-lowest p-6 rounded-lg ambient-shadow border border-outline-variant/15 transition-all duration-200 group-hover:-translate-y-0.5 group-hover:shadow-md peer-checked:bg-surface-container-high peer-checked:border-primary peer-checked:shadow-none flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-body-lg text-on-surface font-medium flex-grow">CPU</span>
</div>
</label>
<!-- Option 4 -->
<label class="group cursor-pointer relative">
<input class="peer sr-only" name="question_5" type="radio" value="mouse"/>
<div class="bg-surface-container-lowest p-6 rounded-lg ambient-shadow border border-outline-variant/15 transition-all duration-200 group-hover:-translate-y-0.5 group-hover:shadow-md peer-checked:bg-surface-container-high peer-checked:border-primary peer-checked:shadow-none flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-body-lg text-on-surface font-medium flex-grow">Mouse</span>
</div>
</label>
</div>
</div>
</main>
<!-- Bottom Controls & Grid -->
<div class="w-full bg-surface-container-low border-t border-outline-variant/10 py-6 px-6 relative z-20">
<div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
<!-- Actions -->
<div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
<button class="text-primary font-medium text-sm px-4 py-2 rounded-md hover:bg-primary/10 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Previous
                </button>
<button class="text-on-surface-variant font-medium text-sm px-4 py-2 rounded-md hover:bg-surface-variant transition-colors flex items-center gap-2 border border-outline-variant/30">
<span class="material-symbols-outlined text-[18px]">flag</span>
                    Flag for Review
                </button>
</div>
<!-- Next Button -->
<div class="w-full md:w-auto">
<button class="w-full md:w-auto bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold text-sm px-8 py-3 rounded-lg shadow-sm hover:shadow-md transition-all duration-200 flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
<!-- Question Status Grid (Minimal) -->
<div class="max-w-5xl mx-auto mt-6 pt-6 border-t border-outline-variant/10">
<div class="flex flex-wrap gap-2 justify-center md:justify-start">
<!-- Example states: Answered, Current, Unanswered, Flagged -->
<div class="w-8 h-8 rounded bg-primary/20 text-primary font-mono text-xs flex items-center justify-center border border-primary/30">1</div>
<div class="w-8 h-8 rounded bg-primary/20 text-primary font-mono text-xs flex items-center justify-center border border-primary/30">2</div>
<div class="w-8 h-8 rounded bg-primary/20 text-primary font-mono text-xs flex items-center justify-center border border-primary/30">3</div>
<div class="w-8 h-8 rounded bg-error-container text-on-error-container font-mono text-xs flex items-center justify-center relative">
                    4
                    <div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-error rounded-full"></div>
</div>
<!-- Current -->
<div class="w-8 h-8 rounded bg-surface-container-lowest text-on-surface font-mono text-xs flex items-center justify-center border-2 border-primary font-bold shadow-sm">5</div>
<!-- Unanswered -->
<div class="w-8 h-8 rounded bg-surface-container text-on-surface-variant font-mono text-xs flex items-center justify-center border border-outline-variant/20">6</div>
<div class="w-8 h-8 rounded bg-surface-container text-on-surface-variant font-mono text-xs flex items-center justify-center border border-outline-variant/20">7</div>
<div class="text-on-surface-variant font-mono text-xs flex items-end px-1">...</div>
<div class="w-8 h-8 rounded bg-surface-container text-on-surface-variant font-mono text-xs flex items-center justify-center border border-outline-variant/20">18</div>
</div>
</div>
</div>
</body></html>
