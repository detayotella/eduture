<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Assessment Results - Intellectual Atelier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#fefcff",
                    "inverse-primary": "#b4c5ff",
                    "tertiary-fixed-dim": "#d0bcff",
                    "surface-bright": "#fff8f2",
                    "error-container": "#ffdad6",
                    "primary": "#0051d5",
                    "on-surface": "#1e1b17",
                    "surface-container-highest": "#e8e1db",
                    "on-secondary-fixed": "#00164e",
                    "on-primary-fixed-variant": "#003ea8",
                    "outline": "#727785",
                    "on-secondary": "#ffffff",
                    "tertiary": "#6b38d4",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#dce1ff",
                    "primary-container": "#316bf3",
                    "surface": "#fff8f2",
                    "on-tertiary-fixed-variant": "#5516be",
                    "on-primary-fixed": "#00174b",
                    "on-secondary-fixed-variant": "#264191",
                    "on-background": "#1e1b17",
                    "background": "#fff8f2",
                    "on-primary": "#ffffff",
                    "secondary": "#4059aa",
                    "primary-fixed": "#dbe1ff",
                    "tertiary-fixed": "#e9ddff",
                    "on-tertiary-container": "#fffbff",
                    "surface-tint": "#0053db",
                    "outline-variant": "#c2c6d6",
                    "tertiary-container": "#8455ef",
                    "surface-container-low": "#faf2eb",
                    "primary-fixed-dim": "#b4c5ff",
                    "secondary-container": "#8fa7fe",
                    "surface-variant": "#e8e1db",
                    "secondary-fixed-dim": "#b6c4ff",
                    "on-surface-variant": "#424754",
                    "on-secondary-container": "#1d3989",
                    "surface-container": "#f4ede6",
                    "on-tertiary-fixed": "#23005c",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#f7efe9",
                    "surface-dim": "#e0d9d2",
                    "surface-container-high": "#eee7e0",
                    "inverse-surface": "#33302c",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.background');
            color: theme('colors.on-surface');
            -webkit-font-smoothing: antialiased;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Subtle Confetti Background */
        .confetti-bg {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 81, 213, 0.05) 4px, transparent 4px),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.05) 5px, transparent 5px),
                radial-gradient(circle at 50% 60%, rgba(249, 115, 22, 0.05) 3px, transparent 3px),
                radial-gradient(circle at 10% 80%, rgba(139, 92, 246, 0.05) 6px, transparent 6px),
                radial-gradient(circle at 90% 70%, rgba(0, 81, 213, 0.05) 4px, transparent 4px);
            background-size: 100% 100%;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Ambient Shadows */
        .ambient-shadow {
            box-shadow: 0 4px 20px rgba(30, 27, 23, 0.04), 0 2px 8px rgba(30, 27, 23, 0.08);
        }

        /* Score Ring Gradient */
        .score-ring-conic {
            background: conic-gradient(
                theme('colors.primary') 0%, 
                theme('colors.primary-container') 88%, 
                theme('colors.surface-container-high') 88%, 
                theme('colors.surface-container-high') 100%
            );
        }

        /* Primary Button Gradient */
        .btn-primary-gradient {
            background: linear-gradient(135deg, theme('colors.primary'), theme('colors.primary-container'));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col bg-background relative overflow-x-hidden confetti-bg">
<!-- TopAppBar (Suppressed per instructions for transactional/success screens) -->
<!-- NavigationDrawer (Suppressed) -->
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-6 py-12 md:max-w-md md:mx-auto w-full relative z-10 pb-32">
<!-- Celebratory Header -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high mb-6 ambient-shadow">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</div>
<h1 class="text-[2.25rem] leading-[1.2] font-bold tracking-tight text-on-surface mb-2">Congratulations!</h1>
<p class="text-base text-on-surface-variant font-medium">Module Assessment Complete</p>
</header>
<!-- Score Ring -->
<section class="flex justify-center mb-12">
<div class="relative w-48 h-48 rounded-full score-ring-conic ambient-shadow flex items-center justify-center">
<!-- Inner Cutout -->
<div class="w-40 h-40 bg-surface-container-lowest rounded-full flex flex-col items-center justify-center z-10">
<span class="font-mono text-5xl font-bold text-on-surface tracking-tighter">88<span class="text-2xl text-on-surface-variant">%</span></span>
<span class="text-sm font-medium text-on-surface-variant mt-1 uppercase tracking-widest">Score</span>
</div>
</div>
</section>
<!-- Profile Match Badge -->
<div class="flex justify-center mb-10">
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#10b981]/20 border border-[#10b981]/30">
<span class="w-2 h-2 rounded-full bg-[#10b981]"></span>
<span class="text-sm font-semibold text-on-surface tracking-wide">Pragmatist Profile Matched</span>
</div>
</div>
<!-- Topic Breakdown -->
<section class="mb-12 bg-surface-container-lowest p-6 rounded-xl ambient-shadow">
<h2 class="text-lg font-bold text-on-surface mb-6 border-l-4 border-primary pl-3 leading-none">Topic Breakdown</h2>
<div class="space-y-6">
<!-- Hardware -->
<div>
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-semibold text-on-surface">Hardware</span>
<span class="font-mono text-sm font-medium text-on-surface-variant">95%</span>
</div>
<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 95%;"></div>
</div>
</div>
<!-- Software -->
<div>
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-semibold text-on-surface">Software</span>
<span class="font-mono text-sm font-medium text-on-surface-variant">80%</span>
</div>
<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 80%;"></div>
</div>
</div>
<!-- Networking -->
<div>
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-semibold text-on-surface">Networking</span>
<span class="font-mono text-sm font-medium text-on-surface-variant">88%</span>
</div>
<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 88%;"></div>
</div>
</div>
</div>
</section>
<!-- Action Buttons -->
<section class="flex flex-col gap-4 mt-auto">
<button class="w-full py-4 rounded-md btn-primary-gradient text-on-primary font-bold text-base tracking-wide ambient-shadow hover:shadow-lg transition-shadow">
                Next Module
            </button>
<button class="w-full py-4 rounded-md bg-surface-container-highest text-on-surface font-semibold text-base tracking-wide transition-colors hover:bg-surface-dim">
                Review Mistakes
            </button>
</section>
</main>
<!-- BottomNavBar (Suppressed per instructions for linear/transactional success screens) -->
</body></html>
