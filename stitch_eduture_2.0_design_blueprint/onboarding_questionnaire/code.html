<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EDUTURE 2.0 - Onboarding</title>
<!-- Tailwind CSS via CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter & JetBrains Mono -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Design System Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#5516be",
                        "on-surface-variant": "#424754",
                        "outline-variant": "#c2c6d6",
                        "tertiary-fixed-dim": "#d0bcff",
                        "on-secondary-container": "#1d3989",
                        "tertiary-fixed": "#e9ddff",
                        "inverse-surface": "#33302c",
                        "on-secondary-fixed-variant": "#264191",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e8e1db",
                        "surface-container-high": "#eee7e0",
                        "surface-bright": "#fff8f2",
                        "tertiary": "#6b38d4",
                        "surface": "#fff8f2",
                        "primary": "#0051d5",
                        "secondary-fixed": "#dce1ff",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#fff8f2",
                        "outline": "#727785",
                        "on-primary-container": "#fefcff",
                        "inverse-primary": "#b4c5ff",
                        "surface-dim": "#e0d9d2",
                        "on-secondary-fixed": "#00164e",
                        "on-background": "#1e1b17",
                        "on-tertiary-fixed": "#23005c",
                        "on-surface": "#1e1b17",
                        "surface-container-highest": "#e8e1db",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-container": "#8455ef",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-low": "#faf2eb",
                        "on-tertiary-container": "#fffbff",
                        "surface-container": "#f4ede6",
                        "secondary": "#4059aa",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#b6c4ff",
                        "on-primary-fixed": "#00174b",
                        "on-error": "#ffffff",
                        "secondary-container": "#8fa7fe",
                        "inverse-on-surface": "#f7efe9",
                        "primary-container": "#316bf3",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "surface-tint": "#0053db"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "mono": ["'JetBrains Mono'", "monospace"]
                    },
                    fontSize: {
                        "display-lg": ["3.5rem", { lineHeight: "1.1", letterSpacing: "-0.02em" }],
                        "headline-md": ["1.75rem", { lineHeight: "1.2", letterSpacing: "-0.01em" }],
                        "title-lg": ["1.375rem", { lineHeight: "1.4", letterSpacing: "0" }],
                        "body-lg": ["1rem", { lineHeight: "1.625", letterSpacing: "0" }],
                        "label-md": ["0.75rem", { lineHeight: "1.5", letterSpacing: "0.05em" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-bright text-on-surface min-h-screen flex flex-col font-body selection:bg-primary-container selection:text-on-primary-container relative">
<!-- Escape Hatch Header (Transactional Navigation Suppressed, only minimal exit intent) -->
<header class="w-full absolute top-0 left-0 right-0 py-8 px-8 flex justify-between items-center z-50">
<!-- Brand Anchor style -->
<div class="text-xl font-extrabold tracking-tighter text-on-background">
            EDUTURE 2.0
        </div>
<!-- Tertiary action -->
<button class="text-primary hover:text-primary-container transition-colors duration-300 font-label text-label-md uppercase flex items-center gap-2 group">
<span class="hidden sm:inline">Save &amp; Continue Later</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">exit_to_app</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 w-full">
<!-- Centered, distraction-free container -->
<div class="w-full max-w-[720px] flex flex-col gap-10 z-10">
<!-- Section Header & Progress -->
<div class="flex flex-col gap-5 w-full">
<div class="flex justify-between items-end px-2">
<h1 class="font-label text-label-md uppercase text-on-surface-variant font-semibold">
                        Section 1 of 4 — Activist Preferences
                    </h1>
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span class="font-mono text-sm">5 minutes remaining</span>
</div>
</div>
<!-- Thick Segmented Progress Bar -->
<div class="flex gap-3 h-3 w-full">
<div class="flex-1 bg-primary rounded-full shadow-[inset_0_1px_3px_rgba(0,0,0,0.1)]"></div>
<div class="flex-1 bg-surface-container-highest rounded-full transition-colors"></div>
<div class="flex-1 bg-surface-container-highest rounded-full transition-colors"></div>
<div class="flex-1 bg-surface-container-highest rounded-full transition-colors"></div>
</div>
</div>
<!-- Question Card (Ambient Layering & High Contrast) -->
<div class="bg-surface-container-lowest rounded-xl p-10 sm:p-14 shadow-[0_4px_20px_rgba(30,27,23,0.04),0_2px_8px_rgba(30,27,23,0.08)] flex flex-col items-center relative overflow-hidden group">
<!-- Subtle Gradient Atmosphere (Cognitive Fluidity) -->
<div class="absolute -top-32 -right-32 w-96 h-96 bg-gradient-to-br from-primary/5 to-surface-bright rounded-full blur-[60px] pointer-events-none transition-opacity duration-1000 opacity-70 group-hover:opacity-100"></div>
<!-- Technical Tracker -->
<div class="font-mono text-sm text-on-surface-variant mb-8 px-4 py-1.5 bg-surface-container-low rounded-full tracking-widest uppercase">
                    Question 12 of 80
                </div>
<!-- Question Text (Editorial Authority) -->
<h2 class="font-headline text-headline-md font-medium text-center text-on-background mb-14 max-w-lg z-10">
                    I often find myself acting first and thinking about the consequences later.
                </h2>
<!-- Action Buttons (No 1px solid borders - using 2px ghost borders & tonal shifts) -->
<div class="flex flex-col sm:flex-row w-full gap-5 z-10">
<!-- Primary Intent Button -->
<button class="flex-1 py-6 px-6 rounded-lg bg-surface-bright border-2 border-primary/20 text-primary hover:bg-surface-container-low hover:border-primary/40 hover:shadow-[0_4px_20px_rgba(0,81,213,0.08)] transition-all duration-300 font-headline font-semibold text-title-lg flex flex-col items-center justify-center gap-3">
<span class="material-symbols-outlined text-[32px] font-light">check_circle</span>
<span>Yes, that's me</span>
</button>
<!-- Secondary Intent Button -->
<button class="flex-1 py-6 px-6 rounded-lg bg-surface-bright border-2 border-outline-variant/30 text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface hover:border-outline-variant/60 transition-all duration-300 font-headline font-semibold text-title-lg flex flex-col items-center justify-center gap-3">
<span class="material-symbols-outlined text-[32px] font-light">cancel</span>
<span>No, not really</span>
</button>
</div>
</div>
<!-- Subtle progression hint -->
<div class="text-center font-body text-label-md text-on-surface-variant/60 mt-4">
                Your responses adapt the learning pathway in real-time.
            </div>
</div>
</main>
</body></html>
