services:
  db:
    image: postgres:16-alpine
    container_name: eduture-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduture}
      POSTGRES_USER: ${POSTGRES_USER:-eduture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduture_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: eduture-backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'').read()"',
        ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-eduture}:${POSTGRES_PASSWORD:-eduture_pass}@db:5432/${POSTGRES_DB:-eduture}
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: eduture-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
