services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: eduture
      POSTGRES_PASSWORD: eduture_pass
      POSTGRES_DB: eduture
    volumes:
      - eduture_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env.docker
    environment:
      - DATABASE_URL=postgresql+psycopg://eduture:eduture_pass@db:5432/eduture
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    command: ["sh", "/app/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'').read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  eduture_db_data:
